name: TWIN sequential prefix

on:
  issues:
    types: [opened]

jobs:
  prefix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read and increment counter
        id: counter
        run: |
          COUNT=$(cat twin-counter.txt)
          NEW=$(( 10#$COUNT + 1 ))
          printf "%02d" $NEW > twin-counter.txt
          echo "value=$(printf "%02d" $NEW)" >> $GITHUB_OUTPUT

      - name: Commit updated counter
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add twin-counter.txt
          git commit -m "ci: bump TWIN counter to ${{ steps.counter.outputs.value }}"
          git push

      - name: Update issue title
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const twin = '${{ steps.counter.outputs.value }}';
            if (!issue.title.startsWith('TWIN-')) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                title: `TWIN-${twin} - ${issue.title}`
              });
            }